<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hachi & Grecia Spa — Contacto</title>
    <link rel="stylesheet" href="../../styles/maqueta.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="brand-mark">HG</div>
          <div class="brand-copy">
            <strong>Hachi & Grecia</strong><small>Spa Canino</small>
          </div>
        </div>
        <nav class="main-nav">
          <a class="nav-link" href="Inicio.html">Inicio</a>
          <a class="nav-link" href="Servicios.html">Servicios</a>
          <a class="nav-link" href="Equipo.html">Equipo</a>
          <a class="nav-link" href="Galeria.html">Galería</a>
          <a class="nav-link" href="Contacto.html" aria-current="page"
            >Contacto</a
          >
        </nav>
        <div class="header-actions">
          <a class="btn btn-ghost" href="#">Iniciar sesión</a>
          <a class="btn btn-primary" href="#">Agendar cita</a>
        </div>
      </div>
    </header>

    <main>
      <section class="section container">
        <div class="section-heading">
          <h2>Contacto</h2>
          <p class="section-copy">
            Escríbenos para agendar o solicitar más información.
          </p>
        </div>

        <div class="contact-layout">
          <form class="contact-card contact-form card" action="#" method="POST">
            <div class="field-grid">
              <div class="field">
                <label>Nombre</label><input name="nombre" />
              </div>
              <div class="field">
                <label>Teléfono</label><input name="telefono" />
              </div>
            </div>

            <div class="field">
              <label>Correo</label><input name="correo" type="email" />
            </div>
            <div class="field">
              <label>Mensaje</label><textarea name="mensaje"></textarea>
            </div>
            <div class="field">
              <button class="btn btn-primary">Enviar mensaje</button>
            </div>
          </form>

          <aside class="map-card card">
            <div class="map-canvas">
              <div class="map-pin"></div>
            </div>
            <p class="map-caption">
              Estamos en Roma Norte, CDMX — abre de Lunes a Sábado
            </p>
          </aside>
        </div>
      </section>
    </main>
  </body>
</html>
