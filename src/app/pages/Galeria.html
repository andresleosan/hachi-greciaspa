<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hachi & Grecia Spa — Galería</title>
  <link rel="stylesheet" href="../../styles/maqueta.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <div class="brand-mark">HG</div>
        <div class="brand-copy"><strong>Hachi & Grecia</strong><small>Spa Canino</small></div>
      </div>
      <nav class="main-nav">
        <a class="nav-link" href="Inicio.html">Inicio</a>
        <a class="nav-link" href="Servicios.html">Servicios</a>
        <a class="nav-link" href="Equipo.html">Equipo</a>
        <a class="nav-link" href="Galeria.html" aria-current="page">Galería</a>
        <a class="nav-link" href="Contacto.html">Contacto</a>
      </nav>
      <div class="header-actions">
        <a class="btn btn-ghost" href="#">Iniciar sesión</a>
        <a class="btn btn-primary" href="#">Agendar cita</a>
      </div>
    </div>
  </header>

  <main>
    <section class="section container">
      <div class="section-heading">
        <h2>Galería</h2>
        <p class="section-copy">Antes y después — ejemplos reales de nuestros trabajos.</p>
      </div>

      <div class="gallery-grid">
        <article class="gallery-tile gallery-tile--wide">
          <div class="gallery-tile__label">Baños & Grooming</div>
        </article>
        <article class="gallery-tile gallery-tile--tall gallery-tile--teal">
          <div class="gallery-tile__label">Guardería</div>
        </article>
        <article class="gallery-tile gallery-tile--square gallery-tile--rose">
          <div class="gallery-tile__label">Pensión</div>
        </article>
        <article class="gallery-tile gallery-tile--square gallery-tile--mint">
          <div class="gallery-tile__label">Estética</div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
