<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hachi & Grecia Spa — Equipo</title>
    <link rel="stylesheet" href="../../styles/maqueta.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="brand-mark">HG</div>
          <div class="brand-copy">
            <strong>Hachi & Grecia</strong><small>Spa Canino</small>
          </div>
        </div>
        <nav class="main-nav">
          <a class="nav-link" href="Inicio.html">Inicio</a>
          <a class="nav-link" href="Servicios.html">Servicios</a>
          <a class="nav-link" href="Equipo.html" aria-current="page">Equipo</a>
          <a class="nav-link" href="Galeria.html">Galería</a>
          <a class="nav-link" href="Contacto.html">Contacto</a>
        </nav>
        <div class="header-actions">
          <a class="btn btn-ghost" href="#">Iniciar sesión</a>
          <a class="btn btn-primary" href="#">Agendar cita</a>
        </div>
      </div>
    </header>

    <main>
      <section class="section container">
        <div class="section-heading">
          <h2>Nuestro equipo</h2>
          <p class="section-copy">
            Profesionales certificados que cuidan a tu mascota con amor.
          </p>
        </div>

        <div class="card-grid card-grid--team">
          <article class="team-card card">
            <div class="team-card__visual"></div>
            <div>
              <div class="team-card__name">Hachi</div>
              <div class="team-card__role">Groomer Principal</div>
            </div>
          </article>

          <article class="team-card card">
            <div class="team-card__visual"></div>
            <div>
              <div class="team-card__name">Grecia</div>
              <div class="team-card__role">Cuidadora Especializada</div>
            </div>
          </article>

          <article class="team-card card">
            <div class="team-card__visual"></div>
            <div>
              <div class="team-card__name">Carlos</div>
              <div class="team-card__role">Asistente General</div>
            </div>
          </article>

          <article class="team-card card">
            <div class="team-card__visual"></div>
            <div>
              <div class="team-card__name">Ana López</div>
              <div class="team-card__role">Administradora</div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
